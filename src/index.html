<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mey-Shop · Catálogo natural</title>
    <!-- Fuente orgánica -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;600;700&display=swap"
        rel="stylesheet" />
    <!-- Font Awesome para iconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <style>
        /* ===== RESET Y VARIABLES ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --negro: #1e1e1e;
            --arena: #d4b895;
            --verde-claro: #a8c4a0;
            --verde-oscuro: #3b5e3b;
            --carmelita: #a67c52;
            --fondo: #f7f2eb;
            --card-bg: #ffffffd9;
            --sombra: 0 8px 24px rgba(0, 0, 0, 0.06);
            --radio: 20px;
            --transition: 0.3s ease;
        }

        body {
            font-family: 'Quicksand', sans-serif;
            background-color: var(--fondo);
            color: var(--negro);
            padding: 2rem 1.5rem;
            min-height: 100vh;
            background-image: radial-gradient(circle at 10% 20%, rgba(180, 160, 130, 0.08) 0%, transparent 50%);
        }

        .container {
            max-width: 1280px;
            margin: 0 auto;
        }

        /* ===== HEADER ===== */
        header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            padding: 1.2rem 2rem;
            background: rgba(255, 248, 240, 0.7);
            backdrop-filter: blur(8px);
            border-radius: 60px;
            box-shadow: var(--sombra);
            margin-bottom: 3rem;
            border: 1px solid rgba(212, 184, 149, 0.25);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logo i {
            font-size: 2rem;
            color: var(--verde-oscuro);
        }

        .logo h1 {
            font-weight: 700;
            font-size: 1.9rem;
            letter-spacing: -0.5px;
            color: var(--negro);
        }

        .logo h1 span {
            color: var(--carmelita);
            font-weight: 300;
        }

        .header-actions {
            display: flex;
            gap: 1rem;
            align-items: center;
        }

        .header-actions .hint {
            font-size: 0.85rem;
            color: #6a6a6a;
            background: rgba(212, 184, 149, 0.2);
            padding: 0.5rem 1.2rem;
            border-radius: 40px;
            border: 1px dashed var(--arena);
        }

        .header-actions .hint i {
            color: var(--carmelita);
            margin-right: 0.4rem;
        }

        /* ===== CATALOG INFO ===== */
        .catalog-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .catalog-info h2 {
            font-weight: 600;
            font-size: 1.8rem;
            color: var(--negro);
        }

        .catalog-info h2 i {
            color: var(--verde-oscuro);
            margin-right: 0.5rem;
        }

        .catalog-info .count {
            background: var(--arena);
            padding: 0.3rem 1rem;
            border-radius: 30px;
            font-weight: 600;
            color: #2a2a2a;
            font-size: 0.95rem;
        }

        /* ===== GRID DE PRODUCTOS ===== */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 2rem;
        }

        .product-card {
            background: var(--card-bg);
            backdrop-filter: blur(4px);
            border-radius: var(--radio);
            overflow: hidden;
            box-shadow: var(--sombra);
            transition: var(--transition);
            border: 1px solid rgba(212, 184, 149, 0.2);
            display: flex;
            flex-direction: column;
        }

        .product-card:hover {
            transform: translateY(-8px);
            box-shadow: 0 16px 40px rgba(0, 0, 0, 0.08);
            border-color: var(--arena);
        }

        .product-image {
            height: 240px;
            background: #e8ddd0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            color: var(--carmelita);
            position: relative;
            overflow: hidden;
        }

        .product-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-image .placeholder-icon {
            opacity: 0.3;
        }

        .product-body {
            padding: 1.2rem 1.5rem 1.5rem;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .product-body h3 {
            font-weight: 700;
            font-size: 1.2rem;
            margin-bottom: 0.2rem;
            color: var(--negro);
        }

        .product-body .category {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--carmelita);
            font-weight: 600;
            margin-bottom: 0.4rem;
        }

        .product-body .price {
            font-weight: 700;
            font-size: 1.4rem;
            color: var(--verde-oscuro);
            margin: 0.3rem 0 0.5rem;
        }

        .product-body .description {
            font-weight: 300;
            font-size: 0.9rem;
            color: #4a4a4a;
            line-height: 1.5;
            flex: 1;
            margin-bottom: 0.8rem;
        }

        .product-body .meta {
            display: flex;
            flex-wrap: wrap;
            gap: 0.4rem 0.8rem;
            font-size: 0.8rem;
            color: #5a5a5a;
            border-top: 1px solid #eee;
            padding-top: 0.7rem;
            margin-top: 0.3rem;
        }

        .product-body .meta i {
            color: var(--carmelita);
            width: 1.2rem;
        }

        /* ===== EMPTY STATE ===== */
        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(255, 248, 240, 0.5);
            border-radius: 40px;
            border: 2px dashed var(--arena);
        }

        .empty-state i {
            font-size: 4rem;
            color: var(--arena);
            margin-bottom: 1rem;
        }

        .empty-state h3 {
            font-weight: 600;
            font-size: 1.4rem;
            color: var(--negro);
        }

        .empty-state p {
            color: #6a6a6a;
            max-width: 400px;
            margin: 0.5rem auto 0;
        }

        .empty-state .code-hint {
            margin-top: 1.5rem;
            background: #f0ebe4;
            padding: 0.8rem 1.2rem;
            border-radius: 16px;
            font-size: 0.8rem;
            color: #3a3a3a;
            display: inline-block;
            border: 1px solid var(--arena);
        }

        .empty-state .code-hint i {
            font-size: 0.9rem;
            margin-right: 0.4rem;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 700px) {
            header {
                flex-direction: column;
                gap: 1rem;
                padding: 1.2rem 1.5rem;
                border-radius: 30px;
            }

            .header-actions {
                flex-wrap: wrap;
                justify-content: center;
            }

            .catalog-info {
                flex-direction: column;
                align-items: flex-start;
            }
        }

        @media (max-width: 480px) {
            body {
                padding: 1rem 0.8rem;
            }

            .product-grid {
                grid-template-columns: 1fr;
            }

            .header-actions .hint {
                font-size: 0.75rem;
                padding: 0.3rem 0.8rem;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <!-- HEADER -->
        <header>
            <div class="logo">
                <i class="fas fa-leaf"></i>
                <h1>Mey<span>Shop</span></h1>
            </div>
            <div class="header-actions">

            </div>
        </header>

        <!-- CATALOG INFO -->
        <div class="catalog-info">
            <h2></i> Colección</h2>
            <span class="count" id="productCount">0 prendas</span>
        </div>

        <!-- PRODUCT GRID -->
        <div class="product-grid" id="productGrid">
            <!-- Renderizado por JavaScript -->
        </div>

    </div>

    <script>
        // ============================================================
        //  CARGA DE DATOS DESDE JSON EXTERNO
        // ============================================================
        const grid = document.getElementById('productGrid');
        const countEl = document.getElementById('productCount');

        // Datos de ejemplo por si falla la carga del JSON
        const fallbackProducts = []

        let products = [];

        function renderProducts() {
            if (!products || products.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-tree"></i>
                        <h3>Sin prendas en el catálogo</h3>
                        <p>Añade objetos al archivo <code>data.json</code> para que aparezcan aquí.</p>
                        <div class="code-hint">
                            <i class="fas fa-code"></i> Formato: { "name", "category", "price", "image", "description", "meta" }
                        </div>
                    </div>
                `;
                countEl.textContent = '0 prendas';
                return;
            }

            let html = '';
            products.forEach(p => {
                const imageHtml = p.image && p.image.trim() !== ''
                    ? `<img src="media/${p.image}" alt="${p.name}" loading="lazy" />`
                    : `<div class="placeholder-icon"><i class="fas fa-leaf"></i></div>`;

                html += `
                    <div class="product-card">
                        <div class="product-image">
                            ${imageHtml}
                        </div>
                        <div class="product-body">
                            <span class="category">${p.category || 'Prenda'}</span>
                            <h3>${p.name}</h3>
                            <div class="price">${p.price}€</div>
                            <div class="description">${p.description || 'Sin descripción'}</div>
                            ${p.meta ? `<div class="meta"><i class="fas fa-tag"></i> ${p.meta}</div>` : ''}
                        </div>
                    </div>
                `;
            });

            grid.innerHTML = html;
            countEl.textContent = `${products.length} prenda${products.length !== 1 ? 's' : ''}`;
        }

        // Cargar data.json
        async function loadCatalog() {
            try {
                const response = await fetch('static/data.json');
                if (!response.ok) throw new Error('No se pudo cargar data.json');
                const data = await response.json();
                if (Array.isArray(data) && data.length > 0) {
                    products = data;
                } else {
                    // Si el JSON está vacío o no es un array, usamos fallback
                    console.warn('data.json vacío o inválido, usando fallback');
                    products = fallbackProducts;
                }
            } catch (error) {
                console.warn('Error cargando data.json, usando fallback:', error);
                products = fallbackProducts;
            }
            renderProducts();
        }

        // Iniciar
        loadCatalog();
    </script>

</body>

</html>
